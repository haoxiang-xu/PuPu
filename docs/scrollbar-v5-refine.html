<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PuPu · V5 Ticks 精修</title>
<style>
  :root { --bg:#0f0f10; --card:#161617; --edge:rgba(255,255,255,0.06);
          --text:rgba(255,255,255,0.92); --dim:rgba(255,255,255,0.42); }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); padding:44px 40px 90px;
         font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  .head { max-width:1280px; margin:0 auto 18px; }
  .head h1 { font-size:21px; font-weight:600; margin:0 0 8px; letter-spacing:-0.01em; }
  .head p { color:var(--dim); font-size:13px; line-height:1.6; margin:4px 0; max-width:780px; }

  .controls { max-width:1280px; margin:0 auto 30px; display:flex; gap:28px; align-items:center;
              background:var(--card); border:1px solid var(--edge); border-radius:12px; padding:14px 20px; flex-wrap:wrap; }
  .controls label { font-size:12px; color:var(--dim); display:flex; align-items:center; gap:10px; }
  .controls input[type=range] { width:180px; accent-color:#7aa6ff; }
  .controls .val { font-family:"SF Mono",ui-monospace,monospace; font-size:12px; color:var(--text); min-width:42px; }

  .grid { max-width:1280px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
  @media (max-width:1080px){ .grid{ grid-template-columns:repeat(2,1fr);} }
  @media (max-width:620px){ .grid{ grid-template-columns:1fr;} }

  .card { background:var(--card); border:1px solid var(--edge); border-radius:16px; padding:16px 16px 18px; }
  .card .name { font-size:13.5px; font-weight:600; }
  .card .desc { font-size:11px; color:var(--dim); line-height:1.5; margin:6px 0 12px; min-height:46px; }

  .demo { position:relative; height:430px; display:flex; border-radius:12px; overflow:hidden; background:rgba(255,255,255,0.012); }
  .viewport { flex:1; height:100%; overflow-y:auto; padding:16px 14px 36px; scrollbar-width:none; }
  .viewport::-webkit-scrollbar{ width:0; display:none; }
  .msg { margin:0 0 13px; display:flex; }
  .msg.user{ justify-content:flex-end; }
  .bubble{ max-width:78%; border-radius:11px; padding:8px 11px; font-size:11.5px; line-height:1.5; white-space:pre-wrap; }
  .msg.assistant .bubble{ background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.82); }
  .msg.user .bubble{ background:rgba(120,170,255,0.16); color:rgba(225,235,255,0.92); }

  .gutter{ position:relative; height:100%; flex:0 0 auto; padding:14px 0; display:flex; justify-content:center; }
  .track{ position:relative; height:100%; width:100%; }
  .seg{ position:absolute; }
  .vp{ position:absolute; pointer-events:none; }
</style>
</head>
<body>
  <div class="head">
    <h1>V5 Ticks · 精修 — 收窄 + 4 个处理方案</h1>
    <p>问题是上一版那条<b>视口柔光带</b>太宽。这里全部收窄,并给你 4 种"怎么表达当前视口"的方案。拖下面的滑块实时改<b>整列宽度</b>和<b>视口带宽度</b>,拖到你觉得刚好为止。</p>
    <p style="color:rgba(120,170,255,0.85)">user</p>
  </div>

  <div class="controls">
    <label>整列宽度 <input id="gut" type="range" min="8" max="30" step="1" value="14"><span class="val" id="gutV">14px</span></label>
    <label>视口带宽 <input id="band" type="range" min="0" max="14" step="1" value="6"><span class="val" id="bandV">6px</span></label>
    <label>刻度线粗 <input id="tick" type="range" min="1" max="4" step="0.5" value="2"><span class="val" id="tickV">2px</span></label>
  </div>

  <div class="grid" id="grid"></div>

<script>
const SENT=["好的。","嗯,我看看。","这个问题有点意思。",
 "我们可以从几个角度来分析这个需求,先看看现状再决定方向。",
 "让我把整个调用链梳理一遍:入口在路由层,经过中间件后落到 service,再写入 store。",
 "这是一个比较长的回答,涉及多个步骤,需要逐条展开说明,所以它在对话里占的高度会明显更大,指示器上对应的方块也会更长。",
 "短。","再帮我确认一下边界情况?",
 "总结:第一,先读文档;第二,查完整调用链;第三,小步验证。每一步都不要凭直觉改动核心逻辑。"];
const MSGS=[];(function(){const plan=[['user',2],['assistant',5],['user',1],['assistant',6],['assistant',4],
 ['user',7],['assistant',8],['user',0],['assistant',3],['assistant',5],['user',2],['assistant',6],
 ['user',7],['assistant',8],['assistant',1],['user',4],['assistant',5],['user',0],['assistant',6],['assistant',3]];
 for(const[role,idx]of plan){let t=SENT[idx]; if(idx===7||idx===6)t=t+"\n\n"+SENT[4]+" "+SENT[8];
 MSGS.push({role,text:t});}})();

const EASE='cubic-bezier(.22,.61,.36,1)';
const U_ON='rgba(120,170,255,0.95)', U_OFF='rgba(120,170,255,0.40)';
const A_ON='rgba(255,255,255,0.72)', A_OFF='rgba(255,255,255,0.22)';
const px=n=>n+'px';

/* state shared across all demos */
const ST={ gut:14, band:6, tick:2 };
const rebuilders=[];

const VARIANTS=[
 { name:"5A · 柔光带",
   desc:"经典做法但收窄:视口是一条窄柔光带垫在刻度后面。带宽可调,设 0 就纯靠刻度发亮。",
   mode:"band" },
 { name:"5B · 亮度跟随",
   desc:"完全去掉背景带。视口里的刻度直接变亮变实,视口外变暗。最干净,几乎只剩线。",
   mode:"glow" },
 { name:"5C · 侧边游标",
   desc:"刻度恒定淡;视口由一个贴边的细长游标(caret)标出,像书签。位置感最强。",
   mode:"caret" },
 { name:"5D · 描边窗",
   desc:"视口是一个极细的圆角描边框(只有 1px 边、无填充),框住当前这几条。轻但明确。",
   mode:"outline" },
];

function makeDemo(v){
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<div class="name">${v.name}</div><div class="desc">${v.desc}</div>`;
  const demo=document.createElement('div'); demo.className='demo';
  const viewport=document.createElement('div'); viewport.className='viewport';
  const gutter=document.createElement('div'); gutter.className='gutter';
  const track=document.createElement('div'); track.className='track';
  gutter.appendChild(track); demo.appendChild(viewport); demo.appendChild(gutter); card.appendChild(demo);

  const nodes=[];
  for(const m of MSGS){ const row=document.createElement('div'); row.className='msg '+m.role;
    const b=document.createElement('div'); b.className='bubble'; b.textContent=m.text; row.appendChild(b);
    viewport.appendChild(row); nodes.push({row,m}); }

  let api=null, contentH=0, viewH=0, scale=1;
  function build(){
    track.innerHTML='';
    gutter.style.width=px(ST.gut);
    contentH=viewport.scrollHeight; viewH=viewport.clientHeight;
    const trackH=track.clientHeight; scale=trackH/contentH;
    const segs=nodes.map(({row,m})=>({role:m.role, top:row.offsetTop-16, height:row.offsetHeight}));
    api=render(v.mode,{track,segs,scale,viewH});
    api.update(viewport.scrollTop);
  }
  viewport.addEventListener('scroll',()=>api&&api.update(viewport.scrollTop));
  // drag/click jump
  let drag=false;
  const toScroll=y=>{const r=track.getBoundingClientRect();
    const ratio=Math.min(1,Math.max(0,(y-r.top)/r.height)); viewport.scrollTop=ratio*(contentH-viewH);};
  track.addEventListener('pointerdown',e=>{drag=true;track.setPointerCapture(e.pointerId);toScroll(e.clientY);});
  track.addEventListener('pointermove',e=>{if(drag)toScroll(e.clientY);});
  track.addEventListener('pointerup',()=>drag=false);

  rebuilders.push(build);
  requestAnimationFrame(build);
  return card;
}

function render(mode,{track,segs,scale,viewH}){
  // ticks (shared by all modes) — centered thin lines, length = render height
  const ticks=segs.map(s=>{
    const e=document.createElement('div'); e.className='seg';
    Object.assign(e.style,{ top:px(s.top*scale), height:px(Math.max(3,s.height*scale-3)),
      left:'50%', width:px(ST.tick), transform:'translateX(-50%)', borderRadius:'2px',
      background: s.role==='user'?U_OFF:A_OFF, transition:`background .25s ${EASE}` });
    track.appendChild(e); return {e,s};
  });

  if(mode==='band'){
    const band=document.createElement('div'); band.className='vp';
    Object.assign(band.style,{ left:'50%', width:px(ST.band), transform:'translateX(-50%)', borderRadius:'100px',
      background: ST.band>0?'rgba(255,255,255,0.07)':'transparent',
      boxShadow: ST.band>0?'0 0 8px rgba(255,255,255,0.10)':'none',
      transition:`top .14s ${EASE}, height .14s ${EASE}` });
    track.insertBefore(band, track.firstChild);
    return { update(st){ band.style.top=px(st*scale-2); band.style.height=px(Math.max(18,viewH*scale+4));
      brighten(ticks,st,scale,track); } };
  }
  if(mode==='glow'){
    return { update(st){ brighten(ticks,st,scale,track); } };
  }
  if(mode==='caret'){
    const caret=document.createElement('div'); caret.className='vp';
    Object.assign(caret.style,{ right:'0px', width:'2px', borderRadius:'2px',
      background:'rgba(255,255,255,0.85)', boxShadow:'0 0 6px rgba(255,255,255,0.3)',
      transition:`top .14s ${EASE}, height .14s ${EASE}` });
    track.appendChild(caret);
    return { update(st){ caret.style.top=px(st*scale); caret.style.height=px(Math.max(20,viewH*scale));
      brighten(ticks,st,scale,track); } };
  }
  if(mode==='outline'){
    const box=document.createElement('div'); box.className='vp';
    Object.assign(box.style,{ left:'1px', right:'1px', borderRadius:'7px',
      border:'1px solid rgba(255,255,255,0.28)', transition:`top .14s ${EASE}, height .14s ${EASE}` });
    track.insertBefore(box, track.firstChild);
    return { update(st){ box.style.top=px(st*scale-3); box.style.height=px(Math.max(20,viewH*scale+6));
      brighten(ticks,st,scale,track); } };
  }
}

function brighten(ticks,st,scale,track){
  const half=track.clientHeight*0.5;
  ticks.forEach(({e,s})=>{
    const y=s.top*scale, yend=y+s.height*scale;
    const inView = yend>st*scale && y<(st*scale+half);
    e.style.background = inView ? (s.role==='user'?U_ON:A_ON) : (s.role==='user'?U_OFF:A_OFF);
  });
}

/* controls */
const $=id=>document.getElementById(id);
function bind(id,key,suffix){ const el=$(id), out=$(id+'V');
  el.addEventListener('input',()=>{ ST[key]=Number(el.value); out.textContent=el.value+suffix;
    rebuilders.forEach(fn=>fn()); }); }
bind('gut','gut','px'); bind('band','band','px'); bind('tick','tick','px');

const grid=document.getElementById('grid');
VARIANTS.forEach(v=>grid.appendChild(makeDemo(v)));
</script>
</body>
</html>
