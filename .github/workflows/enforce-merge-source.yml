name: Enforce Merge Source

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check if source branch is dev
        run: |
          SOURCE="${{ github.head_ref }}"
          if [ "$SOURCE" = "dev" ] || [[ "$SOURCE" == auto/update-readme-downloads-* ]]; then
            echo "✅ Source branch '$SOURCE' is allowed. Merge allowed."
          else
            echo "❌ Only the 'dev' branch (or automated 'auto/update-readme-downloads-*' branches) is allowed to merge into 'main'."
            echo "Current source branch: $SOURCE"
            exit 1
          fi
