name: Enforce Merge Source

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
    branches:
      - dev
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check allowed source branch by target branch
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          if [ "$TARGET" = "main" ]; then
            if [ "$SOURCE" = "dev" ] || [[ "$SOURCE" == auto/update-readme-downloads-* ]]; then
              echo "✅ Source branch '$SOURCE' is allowed to merge into '$TARGET'."
            else
              echo "❌ Only the 'dev' branch (or automated 'auto/update-readme-downloads-*' branches) is allowed to merge into '$TARGET'."
              echo "Current source branch: $SOURCE"
              exit 1
            fi
          elif [ "$TARGET" = "dev" ]; then
            echo "✅ PR targets '$TARGET'; source branch '$SOURCE' is allowed."
          else
            echo "✅ No source branch restriction configured for target '$TARGET'."
          fi
