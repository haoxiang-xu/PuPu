name: Release QA

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      qa_mode:
        description: "QA mode"
        type: choice
        options:
          - lite
          - release
        default: lite
      post_comment:
        description: "Post or update the PR QA comment"
        type: boolean
        default: true
      run_unchain_analysis:
        description: "Run optional Unchain advisory analysis"
        type: boolean
        default: true

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  deterministic-checks:
    name: Deterministic QA
    runs-on: ubuntu-latest
    env:
      UNCHAIN_SOURCE_PATH: ${{ github.workspace }}/unchain
      QA_MODE: ${{ (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.qa_mode == 'release') && 'release' || 'lite' }}
    steps:
      - name: Checkout PuPu
        uses: actions/checkout@v4
        with:
          path: pupu

      - name: Checkout unchain
        uses: actions/checkout@v4
        with:
          repository: haoxiang-xu/unchain
          path: unchain

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pupu/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        working-directory: pupu
        run: npm ci

      - name: Install Python dependencies
        working-directory: pupu
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r unchain_runtime/server/requirements.txt -e ../unchain pytest

      - name: Resolve QA version
        working-directory: pupu
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi
          BUILD_VERSION="${TAG_VERSION:-$PACKAGE_VERSION}"
          {
            echo "QA_VERSION=$PACKAGE_VERSION"
            echo "QA_EXPECTED_VERSION=$TAG_VERSION"
            echo "PUPU_BUILD_VERSION=$BUILD_VERSION"
          } >> "$GITHUB_ENV"

      - name: Frontend tests
        id: frontend
        continue-on-error: true
        working-directory: pupu
        env:
          CI: true
        run: npm run test:frontend -- --passWithNoTests

      - name: Electron tests
        id: electron
        continue-on-error: true
        working-directory: pupu
        run: npm run test:electron

      - name: Python backend tests
        id: python
        continue-on-error: true
        working-directory: pupu/unchain_runtime/server
        env:
          PYTHONPATH: ${{ github.workspace }}/unchain/src
        run: python -m pytest tests/ -q --tb=short

      - name: Web build and version check
        id: web_build
        continue-on-error: true
        working-directory: pupu
        env:
          CI: true
        run: npm run build

      - name: Release QA script tests
        id: release_qa_scripts
        continue-on-error: true
        working-directory: pupu
        run: npm run test:release-qa

      - name: Write deterministic QA report
        if: always()
        working-directory: pupu
        env:
          QA_PLATFORM_NAME: deterministic
          QA_CHECKS_JSON: |
            [
              {"name":"frontend tests","command":"npm run test:frontend -- --passWithNoTests","outcome":"${{ steps.frontend.outcome }}"},
              {"name":"electron tests","command":"npm run test:electron","outcome":"${{ steps.electron.outcome }}"},
              {"name":"python backend tests","command":"python -m pytest tests/ -q --tb=short","outcome":"${{ steps.python.outcome }}"},
              {"name":"web build and version check","command":"npm run build","outcome":"${{ steps.web_build.outcome }}"},
              {"name":"release QA script tests","command":"npm run test:release-qa","outcome":"${{ steps.release_qa_scripts.outcome }}"}
            ]
        run: node scripts/release-qa/write-job-report.mjs --out release-qa-job-report.json

      - name: Upload deterministic QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-qa-job-report-deterministic
          path: pupu/release-qa-job-report.json

  package-matrix:
    name: Package ${{ matrix.name }}
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.qa_mode == 'release' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-arm64
            os: macos-latest
            command: npm run build:electron:mac:unsigned
          - name: mac-intel
            os: macos-15-intel
            command: npm run build:electron:mac:intel:unsigned
          - name: windows
            os: windows-latest
            command: npm run build:electron:win:unsigned
          - name: linux
            os: ubuntu-latest
            command: npm run build:electron:linux
    env:
      UNCHAIN_SOURCE_PATH: ${{ github.workspace }}/unchain
      QA_MODE: release
    steps:
      - name: Checkout PuPu
        uses: actions/checkout@v4
        with:
          path: pupu

      - name: Checkout unchain
        uses: actions/checkout@v4
        with:
          repository: haoxiang-xu/unchain
          path: unchain

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pupu/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        working-directory: pupu
        run: npm ci

      - name: Resolve QA version
        working-directory: pupu
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION=""
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi
          BUILD_VERSION="${TAG_VERSION:-$PACKAGE_VERSION}"
          {
            echo "QA_VERSION=$PACKAGE_VERSION"
            echo "QA_EXPECTED_VERSION=$TAG_VERSION"
            echo "PUPU_BUILD_VERSION=$BUILD_VERSION"
          } >> "$GITHUB_ENV"

      - name: Build unsigned package
        id: package
        continue-on-error: true
        working-directory: pupu
        run: ${{ matrix.command }}

      - name: Write package QA report
        if: always()
        working-directory: pupu
        shell: bash
        env:
          QA_PLATFORM_NAME: ${{ matrix.name }}
          QA_PLATFORM_COMMAND: ${{ matrix.command }}
          QA_ARTIFACT_GLOBS_JSON: '["dist/**/*","unchain_runtime/dist/**/*"]'
          QA_CHECKS_JSON: |
            [
              {"name":"unsigned package build","command":"${{ matrix.command }}","outcome":"${{ steps.package.outcome }}"}
            ]
        run: node scripts/release-qa/write-job-report.mjs --out release-qa-job-report.json

      - name: Upload package QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-qa-job-report-${{ matrix.name }}
          path: pupu/release-qa-job-report.json

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pupu-package-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            pupu/dist/**/*
            pupu/unchain_runtime/dist/**/*

  final-report:
    name: Final Release QA Report
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - deterministic-checks
      - package-matrix
    env:
      UNCHAIN_SOURCE_PATH: ${{ github.workspace }}/unchain
    steps:
      - name: Checkout PuPu
        uses: actions/checkout@v4
        with:
          path: pupu

      - name: Checkout unchain
        uses: actions/checkout@v4
        with:
          repository: haoxiang-xu/unchain
          path: unchain

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download job reports
        uses: actions/download-artifact@v4
        with:
          pattern: release-qa-job-report-*
          path: qa-job-reports
          merge-multiple: false

      - name: Merge deterministic report
        working-directory: pupu
        run: |
          node scripts/release-qa/merge-reports.mjs \
            --input-dir ../qa-job-reports \
            --out-json release-qa-report.json \
            --out-md release-qa-report.md

      - name: Install optional Unchain analyst dependencies
        if: ${{ github.event.inputs.run_unchain_analysis != 'false' }}
        continue-on-error: true
        working-directory: pupu
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../unchain openai anthropic

      - name: Run optional Unchain analyst
        if: ${{ github.event.inputs.run_unchain_analysis != 'false' }}
        continue-on-error: true
        working-directory: pupu
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUPU_QA_PROVIDER: ${{ vars.PUPU_QA_PROVIDER || 'openai' }}
          PUPU_QA_MODEL: ${{ vars.PUPU_QA_MODEL }}
        run: |
          python scripts/release-qa/unchain-qa-analyst.py \
            --report release-qa-report.json \
            --out release-qa-analysis.json

      - name: Write final report
        if: always()
        working-directory: pupu
        shell: bash
        run: |
          ANALYSIS_ARGS=()
          if [[ -f release-qa-analysis.json ]]; then
            ANALYSIS_ARGS=(--analysis-json release-qa-analysis.json)
          fi
          node scripts/release-qa/merge-reports.mjs \
            --input-dir ../qa-job-reports \
            --out-json release-qa-report.json \
            --out-md release-qa-report.md \
            "${ANALYSIS_ARGS[@]}"
          cat release-qa-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload final QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-qa-report
          path: |
            pupu/release-qa-report.json
            pupu/release-qa-report.md
            pupu/release-qa-analysis.json
          if-no-files-found: ignore

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' && github.event.inputs.post_comment != 'false' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pupu-release-qa -->";
            const report = fs.readFileSync("pupu/release-qa-report.md", "utf8");
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Deterministic release gate
        working-directory: pupu
        run: |
          node -e "const r=require('./release-qa-report.json'); if (r.deterministic_result.status === 'failed') { console.error('Deterministic Release QA failed'); process.exit(1); }"
