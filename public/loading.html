<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuPu</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-app-region: drag;
      }

      /* default dark palette — overridden by inline script when light */
      body {
        background: var(--bg, #121212);
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 28px;
      }

      .logo {
        font-family: "Jost", "Segoe UI", system-ui, sans-serif;
        font-size: 28px;
        font-weight: 300;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: var(--fg, rgba(255, 255, 255, 0.75));
        animation: fadein 0.5s ease both;
      }

      /* fadein wrapper — keeps translateY from conflicting with spin */
      .spinner-wrapper {
        opacity: 0;
        animation: fadein 0.5s ease both;
        animation-delay: 0.2s;
      }

      .spinner {
        width: 22px;
        height: 22px;
        border: 2px solid var(--spinner-track, rgba(255, 255, 255, 0.08));
        border-top-color: var(--spinner-arc, rgba(255, 255, 255, 0.4));
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">PuPu</div>
      <div class="spinner-wrapper"><div class="spinner"></div></div>
    </div>
    <script>
      /* Apply persisted theme from URL params injected by the main process */
      (function () {
        var params = new URLSearchParams(window.location.search);
        var bg = params.get("bg");
        var fg = params.get("fg");
        var st = params.get("st");
        var sa = params.get("sa");
        var root = document.documentElement;
        if (bg) root.style.setProperty("--bg", bg);
        if (fg) root.style.setProperty("--fg", fg);
        if (st) root.style.setProperty("--spinner-track", st);
        if (sa) root.style.setProperty("--spinner-arc", sa);
      })();
    </script>
  </body>
</html>
